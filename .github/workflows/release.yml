# Release pipeline: tag vX.Y.Z → 7 self-contained binaries (bun --compile,
# cross-compiled from one Linux runner) → gzip + sha256 → manifest.json →
# GitHub Release with build provenance attestations (contract §2.1).
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard — tag must match src/version.ts
        run: |
          CODE_VERSION=$(grep -oP "VERSION = '\K[^']+" src/version.ts)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CODE_VERSION" != "$TAG_VERSION" ]; then
            echo "src/version.ts has $CODE_VERSION but tag is $TAG_VERSION" >&2
            exit 1
          fi

      - name: Bundle (esbuild, no sourcemap)
        run: node build.mjs

      - name: Compile per-platform binaries
        run: |
          set -euo pipefail
          mkdir -p out
          # target-triple → manifest {os, arch}
          TARGETS="darwin-x64 darwin-arm64 linux-x64 linux-x64-baseline linux-arm64 windows-x64 windows-x64-baseline"
          for t in $TARGETS; do
            echo "==> bun-$t"
            if [[ "$t" == windows-* ]]; then
              bun build dist/bin.js --compile --target="bun-$t" --outfile "out/geoly-$t.exe"
              gzip -9 -c "out/geoly-$t.exe" > "out/geoly-$t.gz"
              rm "out/geoly-$t.exe"
            else
              bun build dist/bin.js --compile --target="bun-$t" --outfile "out/geoly-$t"
              gzip -9 -c "out/geoly-$t" > "out/geoly-$t.gz"
              rm "out/geoly-$t"
            fi
          done
          ls -la out/

      - name: Build manifest.json
        run: |
          node - <<'EOF'
          const fs = require('node:fs');
          const crypto = require('node:crypto');
          const tag = process.env.GITHUB_REF_NAME;
          const repo = process.env.GITHUB_REPOSITORY;
          const files = fs.readdirSync('out').filter((f) => f.endsWith('.gz')).map((f) => {
            const m = f.match(/^geoly-(darwin|linux|windows)-(.+)\.gz$/);
            if (!m) throw new Error(`unexpected asset name: ${f}`);
            const sha256 = crypto.createHash('sha256').update(fs.readFileSync(`out/${f}`)).digest('hex');
            return {
              os: m[1],
              arch: m[2],
              url: `https://github.com/${repo}/releases/download/${tag}/${f}`,
              sha256,
            };
          });
          const manifest = {
            latest: tag.replace(/^v/, ''),
            published_at: new Date().toISOString(),
            files,
            rollback_versions: [],
          };
          fs.writeFileSync('out/manifest.json', JSON.stringify(manifest, null, 2));
          console.log(JSON.stringify(manifest, null, 2));
          EOF

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'out/*.gz'

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" out/*.gz out/manifest.json \
            --title "GEOly CLI $GITHUB_REF_NAME" \
            --notes "Self-contained binaries. Install: \`curl -fsSL https://geoly.ai/install.sh | sh\` (Windows: \`irm https://geoly.ai/install.ps1 | iex\`). All assets carry sha256 (manifest.json) and GitHub build provenance attestations."
